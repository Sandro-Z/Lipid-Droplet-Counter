name: lipid-droplet-runtime
channels:
  - defaults
variables:
  # Prefer CUDA for SAM when an NVIDIA GPU is available.
  SAM_USE_GPU: "1"
  # Avoid leaking incompatible user-site Python packages into the runtime.
  PYTHONNOUSERSITE: "1"
dependencies:
  - python=3.10
  - pip
  - setuptools
  - wheel
  - nodejs>=20,<21
  - pip:
      # Desktop runtime: SAM cell segmentation.
      # Use the official CUDA 12.6 PyTorch wheels so SAM can use GPU
      # without relying on the ad-hoc install_sam_dependencies script.
      - --extra-index-url https://download.pytorch.org/whl/cu126
      - numpy==2.2.6
      - Pillow==12.2.0
      - torch==2.7.1+cu126
      - torchvision==0.22.1+cu126
      - segment-anything==1.0

      # Desktop runtime: StarDist droplet inference.
      # Keep TensorFlow on CPU in this runtime to avoid mixed TF/PyTorch
      # CUDA/cuDNN library conflicts that break SAM GPU inference.
      - tensorflow-cpu==2.21.0
      - stardist==0.9.2
      - csbdeep==0.8.2
      - scipy==1.15.3
      - scikit-image==0.25.2
