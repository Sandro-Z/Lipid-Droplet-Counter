name: lipid-droplet-runtime
channels:
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
      # Desktop runtime: SAM cell segmentation.
      - numpy==2.2.6
      - Pillow==12.2.0
      - torch==2.12.1
      - torchvision==0.27.1
      - segment-anything==1.0

      # Desktop runtime: StarDist droplet inference.
      # The app disables TensorFlow GPU by default; tensorflow-cpu avoids CUDA/NVIDIA packages.
      - tensorflow-cpu==2.21.0
      - stardist==0.9.2
      - csbdeep==0.8.2
      - scipy==1.15.3
      - scikit-image==0.25.2
