name: lipid-droplet-runtime-gpu
channels:
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
      # Desktop runtime: SAM cell segmentation with CUDA-enabled PyTorch.
      - numpy==2.2.6
      - Pillow==12.2.0
      - torch==2.12.1
      - torchvision==0.27.1
      - segment-anything==1.0

      # Desktop runtime: StarDist droplet inference with TensorFlow GPU support.
      - tensorflow[and-cuda]==2.21.0
      - stardist==0.9.2
      - csbdeep==0.8.2
      - scipy==1.15.3
      - scikit-image==0.25.2
variables:
  # droplet_segmenter.py keeps TensorFlow on CPU unless this opt-in flag is set.
  STARDIST_USE_GPU: "1"
