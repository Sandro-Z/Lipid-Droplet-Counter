name: lipid-droplet-runtime-gpu
channels:
  - defaults
variables:
  SAM_USE_GPU: "1"
  PYTHONNOUSERSITE: "1"
  # droplet_segmenter.py keeps TensorFlow on CPU unless this opt-in flag is set.
  STARDIST_USE_GPU: "1"
dependencies:
  - python=3.10
  - pip
  - setuptools
  - wheel
  - nodejs>=20,<21
  - pip:
      # Desktop runtime: SAM cell segmentation with CUDA-enabled PyTorch.
      - --extra-index-url https://download.pytorch.org/whl/cu126
      - numpy==2.2.6
      - Pillow==12.2.0
      - torch==2.7.1+cu126
      - torchvision==0.22.1+cu126
      - segment-anything==1.0

      # Desktop runtime: StarDist droplet inference with TensorFlow GPU support.
      # This mixed TensorFlow-GPU + PyTorch-GPU stack is optional and may
      # still require stricter CUDA library validation than environment-runtime.yml.
      - tensorflow[and-cuda]==2.21.0
      - stardist==0.9.2
      - csbdeep==0.8.2
      - scipy==1.15.3
      - scikit-image==0.25.2
